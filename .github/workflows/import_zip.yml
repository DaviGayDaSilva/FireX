name: Import Project Zip

on:
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install unzip
        run: sudo apt-get install unzip -y

      - name: Extract project zip
        run: unzip project.zip -d extracted

      - name: Move files to frontend
        run: |
          rm -rf frontend/*
          cp -r extracted/* frontend/

      - name: Verify files
        run: ls frontend/

      - name: Done
        run: echo "ZIP importado 🚀"
