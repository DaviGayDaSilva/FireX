name: Import Project Zip and Publish

on:
  workflow_dispatch:

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install unzip -y

      - name: Extract project zip
        run: unzip project.zip -d extracted

      - name: Clean frontend folder
        run: rm -rf frontend/*

      - name: Move extracted files to frontend
        run: cp -r extracted/* frontend/

      - name: Configure Git
        run: |
          git config user.name "firex-bot"
          git config user.email "firex@bot.com"

      - name: Commit changes
        run: |
          git add .
          git commit -m "🔥 FireX: import project.zip update" || echo "No changes"

      - name: Push to repo
        run: git push
