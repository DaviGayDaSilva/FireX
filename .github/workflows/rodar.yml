name: Run FireX Site (Test Mode)

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # instala dependências só se existir package.json
      - name: Install backend deps (safe)
        working-directory: backend
        run: |
          if [ -f package.json ]; then
            npm install
          else
            echo "Sem backend Node, pulando..."
          fi

      # testa se backend existe
      - name: Start backend (if exists)
        working-directory: backend
        run: |
          if [ -f server.js ]; then
            node server.js &
            echo "Backend iniciado"
          else
            echo "Sem backend"
          fi

      # frontend não precisa build
      - name: Install serve
        run: npm install -g serve

      - name: Start frontend (test)
        run: |
          echo "Iniciando frontend..."
          serve frontend -l 8080 &

      - name: Health check
        run: echo "FireX rodando em modo teste 🚀"
