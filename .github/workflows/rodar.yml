name: Run FireX Site

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install

      - name: Start backend
        run: node backend/server.js &

      - name: Start frontend
        run: npx serve frontend -l 8080

      - name: Status
        run: echo "FireX online 🚀"
