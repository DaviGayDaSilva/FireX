<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FireX App</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #050816;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .card {
      padding: 25px;
      border-radius: 16px;

      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);

      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 0 30px rgba(0,0,0,0.6);
    }

    h1 {
      font-size: 26px;
      margin-bottom: 10px;
    }

    button {
      margin-top: 15px;
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;

      background: #1f2937;
      color: white;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
      background: #374151;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>FireX</h1>
    <p>HTML rodando no APK</p>

    <button onclick="alert('OK 😎')">
      Testar
    </button>
  </div>

</body>
</html>
